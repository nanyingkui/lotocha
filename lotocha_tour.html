<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a2a5e">
<title>투어 상품 — 로투차</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1a2a5e;--gold:#f5a623;--bg:#f0ede8;--red:#e53935;--green:#2e7d32;--white:#fff}
body{font-family:-apple-system,'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;max-width:480px;margin:0 auto}

/* ── 헤더 ── */
.header{background:var(--navy);padding:0;position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{display:flex;align-items:center;gap:8px;padding:0 14px;height:52px}
.back-btn{background:none;border:none;color:#8892c4;font-size:22px;cursor:pointer;padding:4px;line-height:1}
.header-title{color:var(--gold);font-size:15px;font-weight:900;flex:1}
.header-sub{color:rgba(255,255,255,.4);font-size:11px}

/* ── 탭 ── */
.tab-bar{background:var(--navy);border-top:1px solid rgba(255,255,255,.08);display:flex;padding:0 10px}
.tab-btn{flex:1;padding:10px 0;font-size:12px;font-weight:700;color:rgba(255,255,255,.4);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;font-family:inherit;transition:all .2s}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── 히어로 배너 ── */
.hero{background:linear-gradient(135deg,#1a2a5e 0%,#2d4080 60%,#1a5276 100%);padding:24px 16px;text-align:center;border-bottom:3px solid var(--gold)}
.hero-emoji{font-size:40px;margin-bottom:8px}
.hero-title{color:var(--white);font-size:20px;font-weight:900;line-height:1.3}
.hero-sub{color:rgba(255,255,255,.7);font-size:12px;margin-top:6px;line-height:1.6}
.hero-badges{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.hero-badge{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.5);color:var(--gold);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}

/* ── 섹션 헤더 ── */
.section-head{padding:16px 14px 8px;display:flex;align-items:center;gap:8px}
.section-head h2{font-size:14px;font-weight:900;color:var(--navy)}
.section-head .cnt{background:var(--gold);color:var(--navy);border-radius:12px;padding:2px 8px;font-size:11px;font-weight:900}

/* ── 상품 카드 ── */
.card{background:var(--white);border-radius:16px;margin:0 12px 14px;overflow:hidden;box-shadow:0 2px 12px rgba(26,42,94,.08);cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.985)}
.card-img{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#c8d6f0,#a0b4e0);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-badge{position:absolute;top:10px;left:10px;background:var(--gold);color:var(--navy);border-radius:8px;padding:3px 9px;font-size:10px;font-weight:900}
.card-badge.pkg{background:var(--navy);color:var(--gold)}
.card-duration{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700}
.card-body{padding:14px}
.card-title{font-size:15px;font-weight:900;color:var(--navy);line-height:1.3}
.card-subtitle{font-size:12px;color:#666;margin-top:3px}
.card-desc{font-size:12px;color:#555;margin-top:8px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-highlights{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.card-hl{background:#f0ede8;border-radius:6px;padding:3px 8px;font-size:10px;color:#555;font-weight:600}
.card-hl:before{content:'✓ '}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid #f0ede8}
.card-price{display:flex;flex-direction:column}
.price-from{font-size:10px;color:#999}
.price-main{font-size:20px;font-weight:900;color:var(--navy)}
.price-cny{font-size:11px;color:#999;margin-top:1px}
.card-cta{background:var(--navy);color:var(--gold);border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit}
.card-cta:active{background:#0f1a3d}

/* ── 상세 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:90vh;overflow-y:auto}
.modal-drag{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.modal-head{padding:16px 16px 0;position:relative}
.modal-close{position:absolute;right:14px;top:14px;background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{font-size:17px;font-weight:900;color:var(--navy);padding-right:40px;line-height:1.3}
.modal-subtitle{font-size:12px;color:#888;margin-top:4px}
.modal-section{padding:14px 16px 0}
.modal-section-title{font-size:12px;font-weight:900;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-section-title:before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px}
.modal-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.modal-list li{font-size:13px;color:#444;padding:6px 10px;background:#f8f7f5;border-radius:8px;display:flex;align-items:flex-start;gap:6px}
.modal-list li:before{content:'✓';color:var(--green);font-weight:900;flex-shrink:0;margin-top:1px}
.modal-list.excl li:before{content:'✗';color:var(--red)}
.modal-itinerary{display:flex;flex-direction:column;gap:8px}
.iti-day{background:#f8f7f5;border-radius:10px;padding:10px 12px;border-left:3px solid var(--gold)}
.iti-day-num{font-size:10px;font-weight:900;color:var(--gold)}
.iti-day-title{font-size:13px;font-weight:700;color:var(--navy);margin-top:2px}
.iti-day-desc{font-size:12px;color:#555;margin-top:4px;line-height:1.5}
.modal-price-box{background:linear-gradient(135deg,var(--navy),#2d4080);border-radius:14px;padding:16px;margin:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.mprice-label{color:rgba(255,255,255,.6);font-size:11px}
.mprice-val{color:var(--gold);font-size:24px;font-weight:900}
.mprice-cny{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
.modal-inquiry{display:flex;gap:8px;padding:14px 16px 24px}
.inq-btn{flex:1;padding:13px;border-radius:12px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;border:none;transition:all .2s}
.inq-kakao{background:#FEE500;color:#1a1a1a}
.inq-kakao:active{background:#e6cf00}
.inq-wechat{background:#07C160;color:#fff}
.inq-wechat:active{background:#05a050}

/* ── 로딩 / 에러 ── */
.loading{text-align:center;padding:40px 20px;color:#999;font-size:13px}
.spinner{width:32px;height:32px;border:3px solid #e0e7f0;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff3f3;border-radius:12px;padding:16px;margin:12px;text-align:center;font-size:13px;color:var(--red)}

/* ── CTA 상단 고정 배너 ── */
.cta-banner{background:linear-gradient(90deg,#07C160,#05a050);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.cta-text{font-size:11px;font-weight:700}
.cta-sub{font-size:10px;opacity:.8;margin-top:1px}
.cta-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:900;text-decoration:none;white-space:nowrap}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-inner">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="header-title">🏔️ 로투차 투어</div>
    <div class="header-sub">장가계 전문</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn on" id="tab-day" onclick="switchTab('day')">🌅 1일투어</button>
    <button class="tab-btn" id="tab-pkg" onclick="switchTab('pkg')">📦 패키지</button>
  </div>
</div>

<!-- WeChat 상담 배너 -->
<div class="cta-banner">
  <div>
    <div class="cta-text">💬 투어 문의 · 맞춤 견적</div>
    <div class="cta-sub">WeChat / KakaoTalk으로 빠른 상담</div>
  </div>
  <a class="cta-btn" href="https://wa.me/" id="wechat-link">상담하기 →</a>
</div>

<!-- 히어로 -->
<div class="hero" id="hero-day">
  <div class="hero-emoji">🌄</div>
  <div class="hero-title">장가계 1일투어</div>
  <div class="hero-sub">핵심 경관지를 하루에 — 한국어 현지 가이드 동행</div>
  <div class="hero-badges">
    <span class="hero-badge">한국어 가이드</span>
    <span class="hero-badge">입장권 포함</span>
    <span class="hero-badge">소그룹 진행</span>
  </div>
</div>
<div class="hero" id="hero-pkg" style="display:none">
  <div class="hero-emoji">🎒</div>
  <div class="hero-title">장가계 패키지 투어</div>
  <div class="hero-sub">숙박 · 교통 · 가이드 All-in-one — 여행을 통째로 맡기세요</div>
  <div class="hero-badges">
    <span class="hero-badge">숙박 포함</span>
    <span class="hero-badge">고속철 연계</span>
    <span class="hero-badge">픽업 서비스</span>
  </div>
</div>

<!-- 상품 목록 -->
<div id="day-list">
  <div class="loading"><div class="spinner"></div>상품 불러오는 중...</div>
</div>
<div id="pkg-list" style="display:none">
  <div class="loading"><div class="spinner"></div>상품 불러오는 중...</div>
</div>

<!-- 상세 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ── Supabase 설정 ──
const SUPA_URL = 'https://qbzoepglovwlarjssqjg.supabase.co';
const SUPA_KEY = 'sb_publishable_oxeR92SfBDMzYAvcNitbPw_Vf0u1y0K';
let sb = null;
try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch(e) {}

let allProducts = [];
let currentTab = 'day';

// ── 탭 전환 ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-day').classList.toggle('on', tab === 'day');
  document.getElementById('tab-pkg').classList.toggle('on', tab === 'pkg');
  document.getElementById('day-list').style.display = tab === 'day' ? '' : 'none';
  document.getElementById('pkg-list').style.display = tab === 'pkg' ? '' : 'none';
  document.getElementById('hero-day').style.display = tab === 'day' ? '' : 'none';
  document.getElementById('hero-pkg').style.display = tab === 'pkg' ? '' : 'none';
}

// ── 가격 포맷 ──
function fmt(n) {
  if (!n) return '문의';
  return n.toLocaleString('ko-KR') + '원~';
}
function fmtCny(n) {
  if (!n) return '';
  return '(¥' + parseFloat(n).toLocaleString() + ')';
}

// ── 카드 HTML 생성 ──
function cardHTML(p) {
  const hl = (p.highlights || []).slice(0, 4);
  const isPkg = p.product_type === 'package';
  const emoji = isPkg ? '🎒' : (p.sort_order === 2 ? '🌄' : p.sort_order === 1 ? '🏔️' : '🚣');
  return `
  <div class="card" onclick="openModal('${p.id}')">
    <div class="card-img">
      ${p.images && p.images[0]
        ? `<img src="${p.images[0]}" alt="${p.title_ko}" loading="lazy">`
        : `<span>${emoji}</span>`}
      <span class="card-badge ${isPkg?'pkg':''}">${isPkg?'패키지':'1일투어'}</span>
      <span class="card-duration">${p.duration_days}일</span>
    </div>
    <div class="card-body">
      <div class="card-title">${p.title_ko}</div>
      <div class="card-subtitle">${p.subtitle_ko||''}</div>
      <div class="card-desc">${p.description_ko||''}</div>
      <div class="card-highlights">
        ${hl.map(h=>`<span class="card-hl">${h}</span>`).join('')}
      </div>
    </div>
    <div class="card-footer">
      <div class="card-price">
        <div class="price-from">성인 1인 기준</div>
        <div class="price-main">${fmt(p.price_krw)}</div>
        <div class="price-cny">${fmtCny(p.price_cny)}</div>
      </div>
      <button class="card-cta">자세히 보기</button>
    </div>
  </div>`;
}

// ── 섹션 헤더 ──
function sectionHTML(emoji, title, cnt) {
  return `<div class="section-head">
    <span style="font-size:18px">${emoji}</span>
    <h2>${title}</h2>
    <span class="cnt">${cnt}개</span>
  </div>`;
}

// ── 상품 렌더링 ──
function renderProducts(products) {
  const dayProds = products.filter(p => p.product_type === 'day_tour');
  const pkgProds = products.filter(p => p.product_type === 'package');

  document.getElementById('day-list').innerHTML =
    sectionHTML('🌅', '1일투어', dayProds.length) +
    (dayProds.length ? dayProds.map(cardHTML).join('') : '<div class="error-box">등록된 1일투어가 없습니다</div>');

  document.getElementById('pkg-list').innerHTML =
    sectionHTML('📦', '패키지 투어', pkgProds.length) +
    (pkgProds.length ? pkgProds.map(cardHTML).join('') : '<div class="error-box">등록된 패키지가 없습니다</div>');
}

// ── 데이터 로드 ──
async function loadProducts() {
  if (!sb) {
    document.getElementById('day-list').innerHTML = '<div class="error-box">데이터베이스 연결 실패</div>';
    document.getElementById('pkg-list').innerHTML = '<div class="error-box">데이터베이스 연결 실패</div>';
    return;
  }
  try {
    const { data, error } = await sb
      .from('tour_products')
      .select('*')
      .eq('status', 'live')
      .eq('is_active', true)
      .order('sort_order');
    if (error) throw error;
    allProducts = data || [];
    renderProducts(allProducts);
  } catch(e) {
    const errMsg = `<div class="error-box">상품을 불러오지 못했습니다<br><small>${e.message}</small></div>`;
    document.getElementById('day-list').innerHTML = errMsg;
    document.getElementById('pkg-list').innerHTML = errMsg;
  }
}

// ── 상세 모달 ──
function openModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const hl = p.highlights || [];
  const inc = p.includes || [];
  const exc = p.excludes || [];
  const iti = p.itinerary || [];
  const isPkg = p.product_type === 'package';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-head">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">${p.title_ko}</div>
      <div class="modal-subtitle">${p.subtitle_ko||''} · ${p.duration_days}일 일정</div>
    </div>

    ${hl.length ? `
    <div class="modal-section">
      <div class="modal-section-title">하이라이트</div>
      <ul class="modal-list">${hl.map(h=>`<li>${h}</li>`).join('')}</ul>
    </div>` : ''}

    ${p.description_ko ? `
    <div class="modal-section">
      <div class="modal-section-title">투어 소개</div>
      <p style="font-size:13px;color:#444;line-height:1.7;padding:6px 10px;background:#f8f7f5;border-radius:8px">${p.description_ko}</p>
    </div>` : ''}

    ${iti.length ? `
    <div class="modal-section">
      <div class="modal-section-title">일정</div>
      <div class="modal-itinerary">
        ${iti.map((d,i)=>`
        <div class="iti-day">
          <div class="iti-day-num">DAY ${d.day||i+1}</div>
          <div class="iti-day-title">${d.title||''}</div>
          ${d.desc?`<div class="iti-day-desc">${d.desc}</div>`:''}
        </div>`).join('')}
      </div>
    </div>` : ''}

    ${inc.length ? `
    <div class="modal-section">
      <div class="modal-section-title">포함 사항</div>
      <ul class="modal-list">${inc.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>` : ''}

    ${exc.length ? `
    <div class="modal-section">
      <div class="modal-section-title">불포함 사항</div>
      <ul class="modal-list excl">${exc.map(e=>`<li>${e}</li>`).join('')}</ul>
    </div>` : ''}

    <div class="modal-price-box">
      <div>
        <div class="mprice-label">성인 1인 기준 (${p.duration_days}일)</div>
        <div class="mprice-val">${fmt(p.price_krw)}</div>
        <div class="mprice-cny">${fmtCny(p.price_cny)}</div>
      </div>
      <div style="text-align:right">
        <div style="color:rgba(255,255,255,.5);font-size:10px">최소 ${p.min_pax||1}명~최대 ${p.max_pax||10}명</div>
        <div style="color:var(--gold);font-size:11px;margin-top:4px;font-weight:700">맞춤 견적 문의 가능</div>
      </div>
    </div>

    <div class="modal-inquiry">
      <button class="inq-btn inq-kakao" onclick="inquireKakao('${p.title_ko}')">
        💬 카카오톡 문의
      </button>
      <button class="inq-btn inq-wechat" onclick="inquireWechat('${p.title_ko}')">
        💚 WeChat 문의
      </button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

// ── 문의 링크 ──
function inquireKakao(title) {
  const msg = encodeURIComponent(`[로투차] ${title} 투어 문의드립니다.`);
  window.open(`https://open.kakao.com/o/lotocha`, '_blank'); // 오픈채팅 링크로 교체 필요
}
function inquireWechat(title) {
  alert('WeChat ID: lotocha\n\n상품명을 말씀해 주세요: ' + title);
}

// ── 초기화 ──
loadProducts();
</script>
</body>
</html>
