<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a2a5e">
<title>투어 상품 — 로투차</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1a2a5e;--gold:#f5a623;--bg:#f0ede8;--red:#e53935;--green:#2e7d32;--blue:#1565c0}
body{font-family:-apple-system,'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:60px}
/* 헤더 */
.header{background:var(--navy);position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{display:flex;align-items:center;gap:8px;padding:0 14px;height:52px}
.back-btn{background:none;border:none;color:#8892c4;font-size:12px;font-weight:700;cursor:pointer;padding:6px 0;text-decoration:none;flex-shrink:0}
.header-title{color:var(--gold);font-size:15px;font-weight:900;flex:1}
/* 상담 배너 */
.cta-banner{background:linear-gradient(90deg,#07C160,#05a050);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.cta-text{font-size:12px;font-weight:700}
.cta-sub{font-size:10px;opacity:.8;margin-top:1px}
.cta-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:900;text-decoration:none;white-space:nowrap;flex-shrink:0}
/* 탭 */
.tab-bar{background:#fff;border-bottom:1px solid #e0e7f0;display:flex}
.tab-btn{flex:1;padding:12px 0;font-size:13px;font-weight:700;color:#aaa;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;font-family:inherit;transition:all .2s}
.tab-btn.on{color:var(--navy);border-bottom-color:var(--gold)}
/* 래퍼 */
.wrap{padding:13px 13px 0}
/* 상품 카드 */
.product-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 10px rgba(26,42,94,.08)}
.card-badge-row{display:flex;gap:6px;margin-bottom:8px}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge-day{background:#e3f2fd;color:var(--blue)}
.badge-pkg{background:#fff8e1;color:#e65100}
.badge-live{background:#e8f5e9;color:var(--green)}
.card-img{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#1a2a5e,#2a3f8a);display:flex;align-items:center;justify-content:center;font-size:48px}
.card-body{padding:14px}
.card-title{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:3px}
.card-subtitle{font-size:11px;color:#888;margin-bottom:12px;line-height:1.6}
.price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.price-krw{font-size:22px;font-weight:900;color:var(--navy)}
.price-cny{font-size:13px;font-weight:700;color:#888}
.price-label{font-size:10px;color:#aaa;margin-bottom:10px}
.highlights{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.highlight-tag{background:#f4f6fb;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;color:var(--navy)}
.card-footer{display:flex;gap:8px;padding-top:12px;border-top:1px solid #f5f5f5}
.btn-detail{flex:1;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:11px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit}
.btn-inquiry{flex:1;background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:11px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit}
/* 로딩 */
.loading{text-align:center;padding:40px 20px;color:#aaa;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #e0e7f0;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#ffebee;border-radius:10px;padding:14px;font-size:12px;color:var(--red);text-align:center;margin-bottom:14px}
/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.modal-drag{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 0}
.modal-header{padding:14px 18px 0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:17px;font-weight:900;color:var(--navy)}
.modal-close{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1}
.modal-content{padding:14px 18px 24px}
.modal-subtitle{font-size:12px;color:#888;margin-bottom:16px;line-height:1.7}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:11px;font-weight:900;color:#aaa;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.modal-price-box{background:var(--navy);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.modal-price-krw{font-size:26px;font-weight:900;color:#fff}
.modal-price-cny{font-size:13px;color:rgba(255,255,255,.6);margin-top:3px}
.modal-price-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.list-item{display:flex;gap:8px;font-size:12px;color:#444;padding:5px 0;line-height:1.6}
.list-item::before{content:"✓";color:var(--green);font-weight:900;flex-shrink:0}
.list-item.ex::before{content:"✗";color:var(--red)}
.itinerary-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.itinerary-item:last-child{border:none}
.it-time{color:#aaa;font-weight:700;min-width:45px;flex-shrink:0}
.it-name{font-weight:700;color:var(--navy);margin-bottom:2px}
.it-desc{color:#777;line-height:1.6}
.inquiry-btns{display:flex;gap:8px;margin-top:16px}
.inquiry-btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit}
.inquiry-kakao{background:#FEE500;color:#191919}
.inquiry-wechat{background:var(--navy);color:#fff}
/* 가이드 배너 */
.guide-banner{display:flex;align-items:center;justify-content:space-between;background:#f4f6fb;border-radius:12px;padding:13px 15px;margin:0 13px 14px;text-decoration:none;border:1.5px solid #ddd8d0}
.guide-banner-title{font-size:13px;font-weight:900;color:var(--navy)}
.guide-banner-sub{font-size:11px;color:#888;margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a href="lotocha_guide.html" class="back-btn">← 가이드</a>
    <div class="header-title">🏔️ 로투차 투어</div>
  </div>
</div>

<div class="cta-banner">
  <div>
    <div class="cta-text">💬 투어 문의 · 맞춤 견적</div>
    <div class="cta-sub">카카오톡 / WeChat으로 빠른 상담</div>
  </div>
  <a class="cta-btn" href="http://pf.kakao.com/_hvrmn/chat" target="_blank">상담하기 →</a>
</div>

<div class="tab-bar">
  <button class="tab-btn on" id="tab-day" onclick="switchTab('day')">🌅 1일투어</button>
  <button class="tab-btn" id="tab-pkg" onclick="switchTab('pkg')">📦 패키지</button>
</div>

<div class="wrap">
  <div id="day-list"><div class="loading"><div class="spinner"></div>상품 불러오는 중...</div></div>
  <div id="pkg-list" style="display:none"><div class="loading"><div class="spinner"></div>상품 불러오는 중...</div></div>
</div>

<a href="lotocha_guide.html" class="guide-banner">
  <div>
    <div class="guide-banner-title">📖 장가계 첫 방문이세요?</div>
    <div class="guide-banner-sub">교통·결제·현지 맛집·긴급상황 — 무료 여행 가이드</div>
  </div>
  <div style="font-size:20px;color:var(--gold)">→</div>
</a>

<!-- 상세 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://qbzoepglovwlarjssqjg.supabase.co';
const SUPA_KEY = 'sb_publishable_oxeR92SfBDMzYAvcNitbPw_Vf0u1y0K';
let sb = null;
try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch(e) {}

let allProducts = [];
let currentTab = 'day';

function fmt(n) {
  if (!n) return '문의';
  return Math.round(n / 10000) + '만원';
}
function fmtFull(n) {
  if (!n) return '—';
  return n.toLocaleString() + '원';
}
function fmtCny(n) {
  if (!n) return '';
  return '¥' + Number(n).toLocaleString();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-day').classList.toggle('on', tab === 'day');
  document.getElementById('tab-pkg').classList.toggle('on', tab === 'pkg');
  document.getElementById('day-list').style.display = tab === 'day' ? '' : 'none';
  document.getElementById('pkg-list').style.display = tab === 'pkg' ? '' : 'none';
}

function getEmoji(p) {
  if (p.product_type === 'package') return '🏔️';
  const t = (p.title_ko || '').toLowerCase();
  if (t.includes('천문')) return '⛰️';
  if (t.includes('삼림') || t.includes('원가')) return '🌲';
  if (t.includes('대협') || t.includes('황룡')) return '🌉';
  return '🗺️';
}

function cardHTML(p) {
  const highlights = Array.isArray(p.highlights) ? p.highlights.slice(0, 3) : [];
  const tagsHTML = highlights.map(h => `<span class="highlight-tag">${h}</span>`).join('');
  const isPkg = p.product_type === 'package';
  return `
  <div class="product-card">
    <div class="card-img">${getEmoji(p)}</div>
    <div class="card-body">
      <div class="card-badge-row">
        <span class="badge ${isPkg ? 'badge-pkg' : 'badge-day'}">${isPkg ? '패키지 ' + p.duration_days + '일' : '1일투어'}</span>
        <span class="badge badge-live">예약 가능</span>
      </div>
      <div class="card-title">${p.title_ko || '—'}</div>
      <div class="card-subtitle">${p.subtitle_ko || ''}</div>
      <div class="price-row">
        <span class="price-krw">${fmt(p.price_krw)}</span>
        ${p.price_cny ? `<span class="price-cny">${fmtCny(p.price_cny)}</span>` : ''}
      </div>
      <div class="price-label">성인 1인 기준${p.min_pax ? ' · 최소 ' + p.min_pax + '인' : ''}</div>
      ${tagsHTML ? `<div class="highlights">${tagsHTML}</div>` : ''}
      <div class="card-footer">
        <button class="btn-detail" onclick="openModal('${p.id}')">상세 보기</button>
        <button class="btn-inquiry" onclick="inquire('${p.title_ko}')">문의하기</button>
      </div>
    </div>
  </div>`;
}

async function loadProducts() {
  if (!sb) {
    const err = '<div class="error-box">데이터베이스 연결 실패</div>';
    document.getElementById('day-list').innerHTML = err;
    document.getElementById('pkg-list').innerHTML = err;
    return;
  }
  try {
    const { data, error } = await sb
      .from('tour_products')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true });

    if (error) throw error;
    allProducts = data || [];

    const dayProds = allProducts.filter(p => p.product_type === 'day_tour');
    const pkgProds = allProducts.filter(p => p.product_type === 'package');

    document.getElementById('day-list').innerHTML =
      dayProds.length ? dayProds.map(cardHTML).join('') :
      '<div class="error-box">등록된 1일투어가 없습니다</div>';

    document.getElementById('pkg-list').innerHTML =
      pkgProds.length ? pkgProds.map(cardHTML).join('') :
      '<div style="text-align:center;padding:30px 20px;color:#aaa;font-size:13px">🔜 패키지 상품 준비 중입니다<br><small style="font-size:11px">곧 업데이트될 예정입니다</small></div>';

  } catch(e) {
    const err = `<div class="error-box">상품을 불러오지 못했습니다<br><small>${e.message}</small></div>`;
    document.getElementById('day-list').innerHTML = err;
    document.getElementById('pkg-list').innerHTML = err;
  }
}

function openModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const isPkg = p.product_type === 'package';

  const includes = Array.isArray(p.includes) ? p.includes : [];
  const excludes = Array.isArray(p.excludes) ? p.excludes : [];
  const itinerary = Array.isArray(p.itinerary) ? p.itinerary : [];
  const highlights = Array.isArray(p.highlights) ? p.highlights : [];

  document.getElementById('modal-title').textContent = p.title_ko || '—';

  const descHtml = (p.description_ko || '').replace(/\n/g, '<br>');
  let html = `
    <div class="modal-subtitle">${p.subtitle_ko || ''}</div>
    <div class="modal-price-box">
      <div class="modal-price-krw">${fmtFull(p.price_krw)}</div>
      ${p.price_cny ? `<div class="modal-price-cny">${fmtCny(p.price_cny)} (위안화 기준)</div>` : ''}
      <div class="modal-price-label">성인 1인 기준${p.min_pax ? ' · 최소 ' + p.min_pax + '인' : ''}</div>
    </div>
    ${descHtml ? `<div class="modal-section"><div style="font-size:12px;color:#555;line-height:1.9">${descHtml}</div></div>` : ''}`;

  if (highlights.length) {
    html += `<div class="modal-section">
      <div class="modal-section-title">✨ 하이라이트</div>
      ${highlights.map(h => `<div class="list-item">${h}</div>`).join('')}
    </div>`;
  }

  if (itinerary.length) {
    html += `<div class="modal-section">
      <div class="modal-section-title">🗓️ 일정</div>
      ${itinerary.map(it => `
        <div class="itinerary-item">
          <div class="it-time">${it.time || ''}</div>
          <div class="it-desc">${it.name || it.desc || ''}</div>
        </div>`).join('')}
    </div>`;
  }

  if (includes.length) {
    html += `<div class="modal-section">
      <div class="modal-section-title">✅ 포함 사항</div>
      ${includes.map(i => `<div class="list-item">${i}</div>`).join('')}
    </div>`;
  }

  if (excludes.length) {
    html += `<div class="modal-section">
      <div class="modal-section-title">❌ 불포함 사항</div>
      ${excludes.map(i => `<div class="list-item ex">${i}</div>`).join('')}
    </div>`;
  }

  html += `
    <div class="inquiry-btns">
      <button class="inquiry-btn inquiry-kakao" onclick="inquireWithDetail('kakao','${p.id}')">💬 카카오톡 문의</button>
      <button class="inquiry-btn inquiry-wechat" onclick="inquireWithDetail('wechat','${p.id}')">WeChat 문의</button>
    </div>`;

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function buildInquiryMsg(p) {
  const isPkg = p.product_type === 'package';
  let msg = `[로투차 투어 문의]\n`;
  msg += `━━━━━━━━━━━━━━\n`;
  msg += `📌 상품: ${p.title_ko}\n`;
  msg += `🗓️ 유형: ${isPkg ? '패키지 ' + p.duration_days + '일' : '1일투어'}\n`;
  if (p.price_krw) msg += `💰 가격: ${fmtFull(p.price_krw)}/인${p.price_cny ? ' (' + fmtCny(p.price_cny) + ')' : ''}\n`;
  if (p.min_pax) msg += `👥 인원: 최소 ${p.min_pax}인 ~ 최대 ${p.max_pax}인\n`;
  msg += `━━━━━━━━━━━━━━\n`;
  msg += `여행 날짜: \n인원수: \n기타 요청사항: `;
  return msg;
}

function inquireWithDetail(channel, id) {
  const p = allProducts.find(x => x.id === id);
  const msg = p ? buildInquiryMsg(p) : '[로투차] 투어 문의드립니다.';
  if (channel === 'kakao') {
    // 클립보드에 복사 후 카카오 오픈
    if (navigator.clipboard) {
      navigator.clipboard.writeText(msg).then(() => {
        alert('문의 내용이 복사됐습니다!\n카카오톡 채팅창에 붙여넣기(길게 누르기)해서 보내주세요.');
        window.open('http://pf.kakao.com/_hvrmn/chat', '_blank');
      }).catch(() => {
        window.open('http://pf.kakao.com/_hvrmn/chat', '_blank');
      });
    } else {
      window.open('http://pf.kakao.com/_hvrmn/chat', '_blank');
    }
  } else {
    alert('WeChat ID: nanyingkui\n\n아래 내용을 복사해서 보내주세요:\n\n' + msg);
  }
}

function inquire(title) {
  window.open('http://pf.kakao.com/_hvrmn/chat', '_blank');
}
function inquireWechat(title) {
  alert('WeChat ID: nanyingkui\n\n상품: ' + title);
}

loadProducts();
</script>
</body>
</html>
