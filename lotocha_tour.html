<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a2a5e">
<title>투어 상품 — 로투차</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1a2a5e;--gold:#f5a623;--bg:#f0ede8;--red:#e53935;--green:#2e7d32;--blue:#1565c0;--app-w:480px}
html{background:var(--bg)}
body{font-family:-apple-system,'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;max-width:var(--app-w);margin:0 auto;padding-bottom:60px}

/* 헤더 */
.header{background:var(--navy);position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{display:flex;align-items:center;gap:8px;padding:0 14px;height:52px}
.back-btn{background:none;border:none;color:#8892c4;font-size:12px;font-weight:700;cursor:pointer;padding:6px 0;text-decoration:none;flex-shrink:0}
.header-title{color:var(--gold);font-size:15px;font-weight:900;flex:1}

/* 상담 배너 */
.cta-banner{background:linear-gradient(90deg,#07C160,#05a050);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.cta-text{font-size:12px;font-weight:700}
.cta-sub{font-size:10px;opacity:.8;margin-top:1px}
.cta-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:900;text-decoration:none;white-space:nowrap;flex-shrink:0}

/* 탭 */
.tab-bar{background:#fff;border-bottom:1px solid #e0e7f0;display:flex}
.tab-btn{flex:1;padding:12px 0;font-size:13px;font-weight:700;color:#aaa;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;font-family:inherit;transition:all .2s}
.tab-btn.on{color:var(--navy);border-bottom-color:var(--gold)}

/* 래퍼 */
.wrap{padding:13px 13px 0}

/* 상품 카드 */
.product-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 10px rgba(26,42,94,.08);animation:cardIn .3s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-badge-row{display:flex;gap:6px;margin-bottom:8px}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge-day{background:#e3f2fd;color:var(--blue)}
.badge-pkg{background:#fff8e1;color:#e65100}
.badge-live{background:#e8f5e9;color:var(--green)}
.card-img{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#1a2a5e,#2a3f8a);display:flex;align-items:center;justify-content:center;font-size:48px}
.card-body{padding:14px}
.card-title{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:3px}
.card-subtitle{font-size:11px;color:#888;margin-bottom:12px;line-height:1.6}
.price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.price-krw{font-size:22px;font-weight:900;color:var(--navy)}
.price-from{font-size:11px;color:#aaa}
.price-label{font-size:10px;color:#aaa;margin-bottom:10px}
.highlights{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.highlight-tag{background:#f4f6fb;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;color:var(--navy)}
.card-footer{display:flex;gap:8px;padding-top:12px;border-top:1px solid #f5f5f5}
.btn-detail{flex:1;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:11px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .15s ease,opacity .15s ease}
.btn-inquiry{flex:1;background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:11px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .15s ease,opacity .15s ease}
.btn-detail:active,.btn-inquiry:active,.back-btn:active,.cta-btn:active,.tab-btn:active,.modal-close:active,.inquiry-btn:active,.guide-banner:active{transform:scale(.95);opacity:.85}
.back-btn,.cta-btn,.modal-close,.inquiry-btn,.guide-banner{transition:transform .15s ease,opacity .15s ease}

/* 로딩 */
.loading{text-align:center;padding:40px 20px;color:#aaa;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #e0e7f0;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#ffebee;border-radius:10px;padding:14px;font-size:12px;color:var(--red);text-align:center;margin-bottom:14px}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:var(--app-w);max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);animation:modalUp .25s ease both}
@keyframes modalUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal-drag{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 0}
.modal-header{padding:14px 18px 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #f0f0f0;padding-bottom:12px}
.modal-title{font-size:16px;font-weight:900;color:var(--navy)}
.modal-close{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1}
.modal-content{padding:14px 18px 24px}
.modal-subtitle{font-size:11px;color:#888;line-height:1.7;margin-bottom:12px}

/* ── 예약 UI ── */
.booking-section{background:#f8f9fe;border-radius:12px;padding:12px 14px;margin-bottom:12px}
.booking-section-title{font-size:11px;font-weight:900;color:#999;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

/* 날짜 */
.date-input{width:100%;border:1.5px solid #ddd;border-radius:9px;padding:10px 12px;font-size:15px;font-family:inherit;color:var(--navy);background:#fff;outline:none;-webkit-appearance:none}
.date-input:focus{border-color:var(--navy)}

/* 최소인원 안내 */
.min-pax-note{font-size:11px;color:#e65100;font-weight:700;background:#fff3e0;padding:6px 10px;border-radius:7px;margin-bottom:10px}

/* 인원 카운터 */
.pax-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #eee}
.pax-row:last-child{border:none;padding-bottom:0}
.pax-info{flex:1}
.pax-label{font-size:13px;font-weight:700;color:var(--navy)}
.pax-price{font-size:11px;color:#888;margin-top:2px}
.pax-counter{display:flex;align-items:center;gap:12px;flex-shrink:0}
.counter-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--navy);background:#fff;color:var(--navy);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:all .15s}
.counter-btn:active{background:var(--navy);color:#fff}
.counter-val{font-size:17px;font-weight:900;color:var(--navy);min-width:22px;text-align:center}

/* 선택 옵션 */
.option-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #eee;cursor:pointer;user-select:none}
.option-row:last-child{border:none;padding-bottom:0}
.opt-check{width:24px;height:24px;border-radius:6px;border:2px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.opt-check.checked{background:var(--navy);border-color:var(--navy)}
.opt-check.checked::after{content:"✓";color:#fff;font-size:13px;font-weight:900}
.opt-check.radio{border-radius:50%}
.opt-check.radio.checked::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff}
.option-info{flex:1}
.option-label{font-size:13px;font-weight:700;color:var(--navy)}
.option-price{font-size:11px;color:var(--gold);font-weight:700;margin-top:2px}

/* 일자별 일정 빌더 */
.day-plan-card{background:#f8f9fe;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.day-plan-title{font-size:12px;font-weight:900;color:var(--navy);margin-bottom:4px}
.slot-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #eee;cursor:pointer}
.slot-row:last-child{border-bottom:none}
.slot-label{font-size:11px;color:#888;width:46px;flex-shrink:0}
.slot-value{flex:1;font-size:12px;font-weight:700;color:var(--navy)}
.slot-edit{font-size:10px;color:var(--gold);font-weight:700;flex-shrink:0}
.slot-picker{background:#fff;border-radius:8px;padding:4px;margin:2px 0 8px;border:1.5px solid #eee;max-height:180px;overflow-y:auto}
.picker-item{padding:8px 10px;font-size:12px;border-radius:6px;cursor:pointer;color:#555}
.picker-item:active{background:#f0f0f0}
.picker-item.on{background:var(--navy);color:#fff;font-weight:700}

/* 가격 요약 */
.price-summary{background:var(--navy);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.price-line{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.7);padding:3px 0}
.price-divider{height:1px;background:rgba(255,255,255,.2);margin:8px 0}
.price-total-row{display:flex;justify-content:space-between;font-size:17px;font-weight:900;color:#fff;padding:2px 0}
.price-empty{color:rgba(255,255,255,.5);font-size:12px;text-align:center;padding:4px 0}
.min-warn{font-size:11px;color:#ffb74d;margin-top:8px;text-align:center;font-weight:700}

/* 아코디언 */
.accordion{background:#f8f9fe;border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer}
.accordion-title{font-size:13px;font-weight:900;color:var(--navy);display:flex;justify-content:space-between;align-items:center}
.accordion-arrow{color:#bbb;font-size:12px;transition:transform .2s}
.accordion-arrow.open{transform:rotate(180deg)}
.accordion-body{background:#f8f9fe;border-radius:0 0 10px 10px;padding:4px 14px 14px;margin-top:-6px;margin-bottom:6px}

/* 일정 */
.itinerary-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #eee;font-size:12px}
.itinerary-item:last-child{border:none}
.it-time{color:#aaa;font-weight:700;min-width:46px;flex-shrink:0;padding-top:1px}
.it-desc{font-weight:600;color:var(--navy);line-height:1.6;flex:1}

/* 포함/불포함 */
.list-item{display:flex;gap:8px;font-size:12px;color:#444;padding:5px 0;line-height:1.6}
.list-item::before{content:"✓";color:var(--green);font-weight:900;flex-shrink:0}
.list-item.ex::before{content:"✗";color:var(--red)}
.section-label{font-size:11px;font-weight:900;margin:10px 0 6px}
.section-label.inc{color:var(--green)}
.section-label.exc{color:var(--red)}

/* 문의 버튼 */
.inquiry-btns{display:flex;gap:8px;margin-top:14px}
.inquiry-btn{flex:1;padding:14px;border:none;border-radius:11px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit}
.inquiry-kakao{background:#FEE500;color:#191919}
.inquiry-wechat{background:var(--navy);color:#fff}

/* 가이드 배너 */
.guide-banner{display:flex;align-items:center;justify-content:space-between;background:#f4f6fb;border-radius:12px;padding:13px 15px;margin:0 13px 14px;text-decoration:none;border:1.5px solid #ddd8d0}
.guide-banner-title{font-size:13px;font-weight:900;color:var(--navy)}
.guide-banner-sub{font-size:11px;color:#888;margin-top:2px}

.counter-btn,.accordion{transition:transform .15s ease,opacity .15s ease}
.accordion:active{transform:scale(.98)}

/* ── 데스크톱 적응 (모바일 카드 유지 + 가운데 확장) ── */
@media (min-width:601px){
  :root{--app-w:560px}
  html{background:linear-gradient(160deg,#e9ecf3,#dfe3ec)}
  body{box-shadow:0 0 50px rgba(20,30,70,.14);min-height:100vh}
}
@media (prefers-reduced-motion:reduce){
  .product-card,.modal,#day-list,#pkg-list{animation:none!important}
  *{transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a href="lotocha_guide.html" class="back-btn">← 가이드</a>
    <div class="header-title">🏔️ 로투차 투어</div>
  </div>
</div>

<div class="cta-banner">
  <div>
    <div class="cta-text">💬 투어 문의 · 맞춤 견적</div>
    <div class="cta-sub">카카오톡 / WeChat으로 빠른 상담</div>
  </div>
  <a class="cta-btn" href="http://pf.kakao.com/_hvrmn/chat" target="_blank">상담하기 →</a>
</div>

<div class="tab-bar">
  <button class="tab-btn on" id="tab-day" onclick="switchTab('day')">🌅 1일투어</button>
  <button class="tab-btn" id="tab-pkg" onclick="switchTab('pkg')">🧭 맞춤투어</button>
</div>

<div class="wrap">
  <div id="day-list"><div class="loading"><div class="spinner"></div>상품 불러오는 중...</div></div>
  <div id="pkg-list" style="display:none"><div class="loading"><div class="spinner"></div>상품 불러오는 중...</div></div>
</div>

<a href="lotocha_guide.html" class="guide-banner">
  <div>
    <div class="guide-banner-title">📖 장가계 첫 방문이세요?</div>
    <div class="guide-banner-sub">교통·결제·현지 맛집·긴급상황 — 무료 여행 가이드</div>
  </div>
  <div style="font-size:20px;color:var(--gold)">→</div>
</a>

<!-- 상세·예약 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://qbzoepglovwlarjssqjg.supabase.co';
const SUPA_KEY = 'sb_publishable_oxeR92SfBDMzYAvcNitbPw_Vf0u1y0K';
let sb = null;
try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch(e) {}

let allProducts = [];

/* ───── 포맷 헬퍼 ───── */
function fmt(n) {
  if (!n) return '문의';
  return Math.round(n / 10000) + '만원';
}
function fmtFull(n) {
  if (!n && n !== 0) return '—';
  return n.toLocaleString() + '원';
}
function fmtCny(n) {
  if (!n) return '';
  return '¥' + Number(n).toLocaleString();
}
function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

/* ───── 탭 전환 ───── */
function switchTab(tab) {
  document.getElementById('tab-day').classList.toggle('on', tab === 'day');
  document.getElementById('tab-pkg').classList.toggle('on', tab === 'pkg');
  const day = document.getElementById('day-list'), pkg = document.getElementById('pkg-list');
  const show = tab === 'day' ? day : pkg, hide = tab === 'day' ? pkg : day;
  hide.style.display = 'none';
  show.style.display = '';
  show.style.animation = 'none';
  void show.offsetWidth;
  show.style.animation = 'pageIn .25s ease';
}

/* ───── 이모지 ───── */
function getEmoji(p) {
  if (p.product_type === 'package') return '🏔️';
  const t = (p.title_ko || '').toLowerCase();
  if (t.includes('천문')) return '⛰️';
  if (t.includes('삼림') || t.includes('무릉') || t.includes('원가')) return '🌲';
  if (t.includes('대협') || t.includes('황룡')) return '🌉';
  return '🗺️';
}

/* ───── 카드 렌더 ───── */
function cardHTML(p) {
  const tiers = Array.isArray(p.price_tiers) && p.price_tiers.length ? p.price_tiers : null;
  const adultTier = tiers ? tiers.find(t => t.key === 'adult') : null;
  const displayPrice = adultTier ? adultTier.price : p.price_krw;
  const highlights = Array.isArray(p.highlights) ? p.highlights.slice(0, 3) : [];
  const isPkg = p.product_type === 'package';
  return `
  <div class="product-card">
    <div class="card-img">${getEmoji(p)}</div>
    <div class="card-body">
      <div class="card-badge-row">
        <span class="badge ${isPkg ? 'badge-pkg' : 'badge-day'}">${isPkg ? '맞춤투어 ' + p.duration_days + '일' : '1일투어'}</span>
        <span class="badge badge-live">예약 가능</span>
      </div>
      <div class="card-title">${p.title_ko || '—'}</div>
      <div class="card-subtitle">${p.subtitle_ko || ''}</div>
      <div class="price-row">
        <span class="price-from">성인 기준</span>
        <span class="price-krw">${fmt(displayPrice)}</span>
        ${p.price_cny ? `<span style="font-size:12px;color:#aaa">${fmtCny(p.price_cny)}</span>` : ''}
      </div>
      <div class="price-label">최소 ${p.min_pax || 2}인 출발</div>
      ${highlights.length ? `<div class="highlights">${highlights.map(h=>`<span class="highlight-tag">${h}</span>`).join('')}</div>` : ''}
      <div class="card-footer">
        <button class="btn-detail" onclick="openModal('${p.id}')">📋 날짜·인원 선택</button>
        <button class="btn-inquiry" onclick="quickInquire('${p.id}')">💬 문의</button>
      </div>
    </div>
  </div>`;
}

/* ───── 상품 로드 ───── */
async function loadProducts() {
  if (!sb) {
    const err = '<div class="error-box">데이터베이스 연결 실패</div>';
    document.getElementById('day-list').innerHTML = err;
    document.getElementById('pkg-list').innerHTML = err;
    return;
  }
  try {
    const { data, error } = await sb
      .from('tour_products')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true });

    if (error) throw error;
    allProducts = data || [];

    const dayProds = allProducts.filter(p => p.product_type === 'day_tour');
    const pkgProds = allProducts.filter(p => p.product_type === 'package');

    document.getElementById('day-list').innerHTML =
      dayProds.length ? dayProds.map(cardHTML).join('') :
      '<div class="error-box">등록된 1일투어가 없습니다</div>';

    document.getElementById('pkg-list').innerHTML =
      pkgProds.length ? pkgProds.map(cardHTML).join('') :
      '<div style="text-align:center;padding:30px 20px;color:#aaa;font-size:13px">🔜 맞춤투어 상품 준비 중입니다<br><small style="font-size:11px">곧 업데이트될 예정입니다</small></div>';

  } catch(e) {
    const err = `<div class="error-box">상품을 불러오지 못했습니다<br><small>${e.message}</small></div>`;
    document.getElementById('day-list').innerHTML = err;
    document.getElementById('pkg-list').innerHTML = err;
  }
}

/* ══════════════════════════════════════
   예약 모달 상태
══════════════════════════════════════ */
let _modalProductId = null;
let _pax = {};       // { adult:0, child:0, ... }
let _opts = {};      // { massage:false, ... }
let _date = '';
let _hotel = null;     // 선택된 hotel_options key
let _mealNote = '';    // 식사 요구사항 텍스트
let _pkgDays = [];     // [{day:1, am:{key}|null, pm:{key}|null, evening:[{key},...]}, ...]
let _pickerOpen = null; // {day, slot} 현재 펼쳐진 선택 패널

/* ───── 맞춤투어 명소 풀 ─────
   large   : 대형 명소 — 반나절(오전/오후) 차지, 같은 날 최대 1개
   feature : 특색 명소 — 반나절 차지, 하루에 여러 개 가능
   local   : 인문 일정 — 시간대 제약 없음, 중복/복수 추가 가능 */
const ATTRACTION_POOL = {
  tianmen:      { label: '천문산',                    cat: 'large' },
  forest_east:  { label: '국가삼림공원 (동문 A·B선)',     cat: 'large' },
  grand_canyon: { label: '장가계대협곡',                cat: 'large' },
  furong:       { label: '부용진',                     cat: 'large' },
  fenghuang:    { label: '봉황고성',                    cat: 'large' },
  baofeng:      { label: '보봉호',                     cat: 'feature' },
  huanglong:    { label: '황룡동',                     cat: 'feature' },
  qixing:       { label: '칠성산',                     cat: 'feature' },
  tujia:        { label: '토가족 풍정원',                cat: 'feature' },
  forest_south: { label: '국가삼림공원 (남문-황석채)',      cat: 'feature' },
  jinbianxi:    { label: '금편계 트레킹',                cat: 'feature' },
  qiqilou:      { label: '72기루 (야간 관람 추천)',        cat: 'local' },
  supermarket:  { label: '현지 대형마트',                cat: 'local' },
  cafe:         { label: '현지 특색 카페',                cat: 'local' },
};

/* ───── 모달 열기 ───── */
function openModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;

  _modalProductId = id;
  _pax = {};
  _opts = {};
  _date = '';
  _hotel = null;
  _mealNote = '';
  _pickerOpen = null;

  const tiers   = Array.isArray(p.price_tiers)  ? p.price_tiers  : [];
  const options  = Array.isArray(p.tour_options) ? p.tour_options : [];
  const itinerary= Array.isArray(p.itinerary)    ? p.itinerary    : [];
  const includes = Array.isArray(p.includes)     ? p.includes     : [];
  const excludes = Array.isArray(p.excludes)     ? p.excludes     : [];
  const hotelOpts = Array.isArray(p.hotel_options) ? p.hotel_options : [];
  const isPkg = p.product_type === 'package';

  tiers.forEach(t => _pax[t.key] = 0);
  options.forEach(o => _opts[o.key] = false);
  if (hotelOpts.length) _hotel = hotelOpts[0].key;

  /* 패키지: 일정 템플릿 → 일자별 작업본(_pkgDays) 구성 */
  if (isPkg) {
    const looksStructured = itinerary.length && itinerary[0] && typeof itinerary[0].day !== 'undefined';
    _pkgDays = looksStructured
      ? itinerary.map(d => ({
          day: d.day,
          am: d.am ? { key: d.am.key } : null,
          pm: d.pm ? { key: d.pm.key } : null,
          evening: (d.evening || []).map(e => ({ key: e.key })),
        }))
      : Array.from({ length: p.duration_days || 1 }, (_, i) => ({ day: i + 1, am: null, pm: null, evening: [] }));
  } else {
    _pkgDays = [];
  }

  /* 그룹(라디오) 옵션은 그룹 내 첫번째 항목을 기본 선택 */
  const _groupMap = {};
  options.forEach(o => { if (o.group) (_groupMap[o.group] = _groupMap[o.group] || []).push(o); });
  Object.values(_groupMap).forEach(arr => { if (arr.length) _opts[arr[0].key] = true; });

  document.getElementById('modal-title').textContent = p.title_ko || '—';

  /* ── 날짜 선택 ── */
  let html = `
    <div class="modal-subtitle">${p.subtitle_ko || ''}</div>

    <div class="booking-section">
      <div class="booking-section-title">📅 여행 날짜</div>
      <input type="date" class="date-input" id="bk-date"
        min="${getTodayStr()}"
        onchange="_date=this.value">
    </div>`;

  /* ── 인원 선택 ── */
  if (tiers.length) {
    html += `
    <div class="booking-section">
      <div class="booking-section-title">👥 인원 선택</div>
      <div class="min-pax-note">⚠️ 최소 2인 이상 출발 (영유아 제외) · 영유아 만 3세미만 20,000원/인</div>
      ${tiers.map(t => `
        <div class="pax-row">
          <div class="pax-info">
            <div class="pax-label">${t.label}</div>
            <div class="pax-price">${fmtFull(t.price)} / 인</div>
          </div>
          <div class="pax-counter">
            <button class="counter-btn" onclick="changePax('${t.key}',-1,event)">−</button>
            <span class="counter-val" id="cnt-${t.key}">0</span>
            <button class="counter-btn" onclick="changePax('${t.key}',1,event)">+</button>
          </div>
        </div>`).join('')}
    </div>`;
  }

  /* ── 호텔 선택 ── */
  if (hotelOpts.length) {
    html += `
    <div class="booking-section">
      <div class="booking-section-title">🏨 호텔 선택</div>
      ${hotelOpts.map(h => `
        <div class="option-row" onclick="selectHotel('${h.key}')">
          <div class="opt-check radio" id="oh-${h.key}"></div>
          <div class="option-info">
            <div class="option-label">${h.name || h.label || ''}${h.grade ? ' (' + h.grade + ')' : ''}</div>
            <div class="option-price">${h.desc ? h.desc + ' · ' : ''}${h.price ? '+ ' + fmtFull(h.price) + (h.per === 'pax' ? ' / 인' : '') : '기본 포함'}</div>
          </div>
        </div>`).join('')}
      <div class="min-pax-note">📌 중국 명절 기간(국경절·춘절 등)에는 호텔 가격이 변동될 수 있습니다. 정확한 가격은 상담을 통해 확인해 주세요.</div>
    </div>`;
  }

  /* ── 그룹(라디오, 단일선택) 옵션 + 일반(체크박스, 다중선택) 옵션 ── */
  const groupMap = {};
  const plainOpts = [];
  options.forEach(o => {
    if (o.group) { (groupMap[o.group] = groupMap[o.group] || []).push(o); }
    else plainOpts.push(o);
  });
  const GROUP_LABEL = { lodging: '🛏️ 숙박 등급 선택' };
  Object.keys(groupMap).forEach(g => {
    html += `
    <div class="booking-section">
      <div class="booking-section-title">${GROUP_LABEL[g] || '✅ ' + g + ' 선택'}</div>
      ${groupMap[g].map(o => `
        <div class="option-row" onclick="selectGroupOpt('${g}','${o.key}')">
          <div class="opt-check radio" id="oc-${o.key}"></div>
          <div class="option-info">
            <div class="option-label">${o.label}</div>
            <div class="option-price">${o.price ? '+ ' + fmtFull(o.price) + (o.per==='pax' ? ' / 인' : '') : '기본 포함'}</div>
          </div>
        </div>`).join('')}
    </div>`;
  });
  if (plainOpts.length) {
    html += `
    <div class="booking-section">
      <div class="booking-section-title">✅ 선택 옵션 (추가금)</div>
      ${plainOpts.map(o => `
        <div class="option-row" onclick="toggleOpt('${o.key}')">
          <div class="opt-check" id="oc-${o.key}"></div>
          <div class="option-info">
            <div class="option-label">${o.label}</div>
            <div class="option-price">+ ${fmtFull(o.price)}${o.per==='pax' ? ' / 인' : ''}</div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  /* ── 가격 요약 ── */
  html += `<div class="price-summary" id="price-summary">
    <div class="price-empty">인원을 선택하면 금액이 계산됩니다</div>
  </div>`;

  /* ── 일정: 패키지는 일자별 직접 짜기, 1일투어는 기존 아코디언 ── */
  if (isPkg) {
    html += `
    <div class="booking-section">
      <div class="booking-section-title">🗺️ 일정 직접 짜기 (추천 일정 기준, 자유롭게 변경 가능)</div>
      <div class="min-pax-note">📌 대형 명소(천문산·대협곡 등)는 반나절을 차지하며 같은 날 최대 1개만 가능합니다. 특색 명소는 반나절씩 자유 배치 가능하고, 인문 일정(72기루·마트·카페 등)은 시간대 제약 없이 여러 개 추가할 수 있습니다. 실제 입장 가능 여부와 정확한 일정은 상담을 통해 최종 확정됩니다.</div>
      <div id="pkg-dayplan"></div>
    </div>
    <div class="booking-section">
      <div class="booking-section-title">🍽️ 식사 요구사항</div>
      <textarea class="date-input" style="height:64px;resize:vertical;font-size:13px" placeholder="예: 매운음식 못먹어요 / 해산물 알러지 / 한식 위주로 부탁드려요" oninput="_mealNote=this.value"></textarea>
    </div>`;
  } else if (itinerary.length) {
    html += `
    <div class="accordion" onclick="toggleAcc('acc-itin')">
      <div class="accordion-title">🗓️ 투어 일정
        <span class="accordion-arrow" id="arr-acc-itin">▼</span>
      </div>
    </div>
    <div class="accordion-body" id="acc-itin" style="display:none">
      ${itinerary.map(it=>`
        <div class="itinerary-item">
          <div class="it-time">${it.time||''}</div>
          <div class="it-desc">${it.name||it.desc||''}</div>
        </div>`).join('')}
    </div>`;
  }

  /* ── 포함/불포함 아코디언 ── */
  if (includes.length || excludes.length) {
    html += `
    <div class="accordion" onclick="toggleAcc('acc-inc')">
      <div class="accordion-title">✅ 포함 / 불포함 사항
        <span class="accordion-arrow" id="arr-acc-inc">▼</span>
      </div>
    </div>
    <div class="accordion-body" id="acc-inc" style="display:none">
      ${includes.length ? `<div class="section-label inc">포함 사항</div>${includes.map(i=>`<div class="list-item">${i}</div>`).join('')}` : ''}
      ${excludes.length ? `<div class="section-label exc" style="margin-top:10px">불포함 사항</div>${excludes.map(i=>`<div class="list-item ex">${i}</div>`).join('')}` : ''}
    </div>`;
  }

  /* ── 예약 버튼 ── */
  html += `
    <div class="inquiry-btns">
      <button class="inquiry-btn inquiry-kakao" onclick="doInquire('kakao')">💬 카카오톡 예약</button>
      <button class="inquiry-btn inquiry-wechat" onclick="doInquire('wechat')">WeChat 예약</button>
    </div>`;

  document.getElementById('modal-content').innerHTML = html;
  /* 그룹 옵션 기본 선택 상태를 화면에 반영 */
  Object.keys(_opts).forEach(k => {
    if (_opts[k]) { const el = document.getElementById('oc-' + k); if (el) el.classList.add('checked'); }
  });
  if (_hotel) { const el = document.getElementById('oh-' + _hotel); if (el) el.classList.add('checked'); }
  if (isPkg) renderDayPlan();
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* ───── 모달 닫기 ───── */
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

/* ───── 인원 변경 ───── */
function changePax(key, delta, e) {
  if (e) e.stopPropagation();
  _pax[key] = Math.max(0, (_pax[key] || 0) + delta);
  const el = document.getElementById('cnt-' + key);
  if (el) el.textContent = _pax[key];
  updatePriceSummary();
}

/* ───── 옵션 토글 ───── */
function toggleOpt(key) {
  _opts[key] = !_opts[key];
  const el = document.getElementById('oc-' + key);
  if (el) el.classList.toggle('checked', _opts[key]);
  updatePriceSummary();
}

/* ───── 그룹 옵션 선택 (라디오, 단일선택) ───── */
function selectGroupOpt(group, key) {
  const p = allProducts.find(x => x.id === _modalProductId);
  if (!p) return;
  const options = Array.isArray(p.tour_options) ? p.tour_options : [];
  options.filter(o => o.group === group).forEach(o => {
    _opts[o.key] = (o.key === key);
    const el = document.getElementById('oc-' + o.key);
    if (el) el.classList.toggle('checked', _opts[o.key]);
  });
  updatePriceSummary();
}

/* ───── 호텔 선택 (라디오, 단일선택) ───── */
function selectHotel(key) {
  const p = allProducts.find(x => x.id === _modalProductId);
  if (!p) return;
  const hotelOpts = Array.isArray(p.hotel_options) ? p.hotel_options : [];
  _hotel = key;
  hotelOpts.forEach(h => {
    const el = document.getElementById('oh-' + h.key);
    if (el) el.classList.toggle('checked', h.key === key);
  });
  updatePriceSummary();
}

/* ───── 맞춤투어 일자별 일정 빌더 ─────
   규칙: 대형(large)은 오전/오후 중 반나절 차지, 같은 날 다른 슬롯에 이미 대형이 있으면 선택 불가
         특색(feature)은 반나절씩 자유 배치 (하루에 여러 개 가능)
         인문(local)은 시간대 제약 없음 — 오전/오후/저녁 어디든, 저녁은 여러 개 중복 추가 가능 */
function pkgSlotOptions(dayPlan, slot) {
  return Object.keys(ATTRACTION_POOL).map(key => ({ key, ...ATTRACTION_POOL[key] })).filter(item => {
    if (slot === 'evening') return item.cat === 'local';
    if (item.cat !== 'large') return true;
    const other = slot === 'am' ? dayPlan.pm : dayPlan.am;
    const otherItem = other ? ATTRACTION_POOL[other.key] : null;
    return !(otherItem && otherItem.cat === 'large');
  });
}

function renderDayPlan() {
  const SLOT_LABEL = { am: '🌤 오전', pm: '🌇 오후', evening: '🌙 저녁' };
  const html = _pkgDays.map(d => {
    const amItem = d.am ? ATTRACTION_POOL[d.am.key] : null;
    const pmItem = d.pm ? ATTRACTION_POOL[d.pm.key] : null;
    const eveItems = (d.evening || []).map(e => ATTRACTION_POOL[e.key]).filter(Boolean);
    const renderSlot = (slot, valueLabel, editLabel) => `
      <div class="slot-row" onclick="togglePicker(${d.day},'${slot}')">
        <span class="slot-label">${SLOT_LABEL[slot]}</span>
        <span class="slot-value">${valueLabel}</span>
        <span class="slot-edit">${editLabel} ›</span>
      </div>
      ${_pickerOpen && _pickerOpen.day === d.day && _pickerOpen.slot === slot ? renderPicker(d, slot) : ''}`;
    return `
    <div class="day-plan-card">
      <div class="day-plan-title">${d.day}일차</div>
      ${renderSlot('am', amItem ? amItem.label : '선택 안함', '변경')}
      ${renderSlot('pm', pmItem ? pmItem.label : '선택 안함', '변경')}
      ${renderSlot('evening', eveItems.length ? eveItems.map(e => e.label).join(', ') : '선택 안함', '추가')}
    </div>`;
  }).join('');
  document.getElementById('pkg-dayplan').innerHTML = html;
}

function renderPicker(d, slot) {
  const opts = pkgSlotOptions(d, slot);
  if (slot === 'evening') {
    const selKeys = (d.evening || []).map(e => e.key);
    return `<div class="slot-picker">
      ${opts.map(o => `<div class="picker-item ${selKeys.includes(o.key) ? 'on' : ''}" onclick="toggleEvening(${d.day},'${o.key}')">${selKeys.includes(o.key) ? '✓ ' : ''}${o.label}</div>`).join('')}
    </div>`;
  }
  const curKey = d[slot] ? d[slot].key : null;
  return `<div class="slot-picker">
    <div class="picker-item ${!curKey ? 'on' : ''}" onclick="pickAttraction(${d.day},'${slot}',null)">선택 안함</div>
    ${opts.map(o => `<div class="picker-item ${curKey === o.key ? 'on' : ''}" onclick="pickAttraction(${d.day},'${slot}','${o.key}')">${o.label}</div>`).join('')}
  </div>`;
}

function togglePicker(day, slot) {
  _pickerOpen = (_pickerOpen && _pickerOpen.day === day && _pickerOpen.slot === slot) ? null : { day, slot };
  renderDayPlan();
}

function pickAttraction(day, slot, key) {
  const d = _pkgDays.find(x => x.day === day);
  if (!d) return;
  d[slot] = key ? { key } : null;
  _pickerOpen = null;
  renderDayPlan();
}

function toggleEvening(day, key) {
  const d = _pkgDays.find(x => x.day === day);
  if (!d) return;
  d.evening = d.evening || [];
  const idx = d.evening.findIndex(e => e.key === key);
  if (idx === -1) d.evening.push({ key }); else d.evening.splice(idx, 1);
  renderDayPlan();
}

/* ───── 가격 요약 업데이트 ───── */
function updatePriceSummary() {
  const p = allProducts.find(x => x.id === _modalProductId);
  if (!p) return;
  const tiers  = Array.isArray(p.price_tiers)  ? p.price_tiers  : [];
  const options = Array.isArray(p.tour_options) ? p.tour_options : [];
  const hotelOpts = Array.isArray(p.hotel_options) ? p.hotel_options : [];

  let total = 0;
  let totalPax = 0;
  let minPax = 0;
  let lines = [];

  tiers.forEach(t => {
    const cnt = _pax[t.key] || 0;
    if (cnt > 0) {
      const sub = cnt * t.price;
      total += sub;
      totalPax += cnt;
      if (t.counts_min) minPax += cnt;
      lines.push(`<div class="price-line"><span>${t.label} × ${cnt}인</span><span>${fmtFull(sub)}</span></div>`);
    }
  });

  if (totalPax === 0) {
    document.getElementById('price-summary').innerHTML =
      '<div class="price-empty">인원을 선택하면 금액이 계산됩니다</div>';
    return;
  }

  options.forEach(o => {
    if (_opts[o.key]) {
      const cnt = o.per === 'pax' ? totalPax : 1;
      const sub = o.price * cnt;
      total += sub;
      lines.push(`<div class="price-line"><span>${o.label}${o.per==='pax' ? ' × '+cnt+'인' : ''}</span><span>+ ${fmtFull(sub)}</span></div>`);
    }
  });

  const hotel = hotelOpts.find(h => h.key === _hotel);
  if (hotel && hotel.price) {
    const cnt = hotel.per === 'pax' ? totalPax : 1;
    const sub = hotel.price * cnt;
    total += sub;
    lines.push(`<div class="price-line"><span>${hotel.name || hotel.label}${hotel.per==='pax' ? ' × '+cnt+'인' : ''}</span><span>+ ${fmtFull(sub)}</span></div>`);
  }

  const warn = minPax < 2
    ? '<div class="min-warn">⚠️ 최소 2인 이상 출발 (영유아 제외)</div>'
    : '';

  document.getElementById('price-summary').innerHTML = `
    ${lines.join('')}
    <div class="price-divider"></div>
    <div class="price-total-row"><span>예상 총 금액</span><span>${fmtFull(total)}</span></div>
    ${warn}`;
}

/* ───── 아코디언 ───── */
function toggleAcc(id) {
  const body  = document.getElementById(id);
  const arrow = document.getElementById('arr-' + id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !open);
}

/* ───── 예약 메시지 빌드 ───── */
function buildMsg(p) {
  const tiers  = Array.isArray(p.price_tiers)  ? p.price_tiers  : [];
  const options = Array.isArray(p.tour_options) ? p.tour_options : [];
  const hotelOpts = Array.isArray(p.hotel_options) ? p.hotel_options : [];
  const isPkg = p.product_type === 'package';

  let msg = `[로투차 투어 예약 문의]\n━━━━━━━━━━━━━━\n`;
  msg += `📌 상품: ${p.title_ko}\n`;
  msg += `🗓️ 유형: ${isPkg ? '맞춤투어 ' + p.duration_days + '일' : '1일투어'}\n`;
  msg += `📅 여행 날짜: ${_date || '(미선택)'}\n`;
  msg += `━━━━━━━━━━━━━━\n👥 인원:\n`;

  let total = 0;
  let totalPax = 0;
  let hasPax = false;

  tiers.forEach(t => {
    const cnt = _pax[t.key] || 0;
    if (cnt > 0) {
      hasPax = true;
      const sub = cnt * t.price;
      total += sub;
      totalPax += cnt;
      msg += `  ${t.label} × ${cnt}인 = ${fmtFull(sub)}\n`;
    }
  });

  if (!hasPax) msg += `  (미선택)\n`;

  const selOpts = options.filter(o => _opts[o.key]);
  if (selOpts.length) {
    msg += `✅ 선택 옵션:\n`;
    selOpts.forEach(o => {
      const cnt = o.per === 'pax' ? totalPax : 1;
      const sub = o.price * cnt;
      total += sub;
      msg += `  ${o.label}${o.per==='pax' ? ' × '+cnt+'인' : ''}: + ${fmtFull(sub)}\n`;
    });
  }

  const hotel = hotelOpts.find(h => h.key === _hotel);
  if (hotel) {
    const cnt = hotel.per === 'pax' ? totalPax : 1;
    const sub = hotel.price ? hotel.price * cnt : 0;
    total += sub;
    msg += `🏨 호텔: ${hotel.name || hotel.label}${hotel.price ? ' (+ ' + fmtFull(sub) + ')' : ' (기본 포함)'}\n`;
  }

  if (isPkg && _pkgDays.length) {
    msg += `━━━━━━━━━━━━━━\n🗺️ 선택 일정:\n`;
    _pkgDays.forEach(d => {
      const am = d.am && ATTRACTION_POOL[d.am.key] ? ATTRACTION_POOL[d.am.key].label : '-';
      const pm = d.pm && ATTRACTION_POOL[d.pm.key] ? ATTRACTION_POOL[d.pm.key].label : '-';
      const eve = (d.evening || []).map(e => ATTRACTION_POOL[e.key] && ATTRACTION_POOL[e.key].label).filter(Boolean).join(', ') || '-';
      msg += `  ${d.day}일차: 오전 ${am} / 오후 ${pm} / 저녁 ${eve}\n`;
    });
  }

  if (isPkg && _mealNote) {
    msg += `🍽️ 식사 요구사항: ${_mealNote}\n`;
  }

  msg += `━━━━━━━━━━━━━━\n`;
  msg += `💰 예상 총 금액: ${hasPax ? fmtFull(total) : '미선택'}\n`;
  msg += `━━━━━━━━━━━━━━\n기타 요청사항: `;
  return msg;
}

/* ───── 예약 문의 실행 ───── */
function doInquire(channel) {
  const p = allProducts.find(x => x.id === _modalProductId);
  const msg = p ? buildMsg(p) : '[로투차] 투어 문의드립니다.';
  sendInquiry(channel, msg);
}

function quickInquire(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  _modalProductId = id;
  _pax = {}; _opts = {}; _date = ''; _hotel = null; _mealNote = ''; _pkgDays = [];
  sendInquiry('kakao', buildMsg(p));
}

function sendInquiry(channel, msg) {
  if (channel === 'kakao') {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(msg).then(() => {
        alert('📋 예약 내용이 복사됐습니다!\n카카오톡 채팅창에 붙여넣기(길게 누르기)해서 보내주세요.');
        window.open('http://pf.kakao.com/_hvrmn/chat', '_blank');
      }).catch(() => window.open('http://pf.kakao.com/_hvrmn/chat', '_blank'));
    } else {
      window.open('http://pf.kakao.com/_hvrmn/chat', '_blank');
    }
  } else {
    alert('WeChat ID: nanyingkui\n\n아래 내용을 복사해서 보내주세요 👇\n\n' + msg);
  }
}

loadProducts();
</script>
